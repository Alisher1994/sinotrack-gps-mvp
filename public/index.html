<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Logistic GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="map-shell">
        <div id="map" aria-label="GPS map"></div>
      </section>

      <aside class="status-panel" aria-label="Tracker status">
        <img
          class="vehicle-photo"
          src="https://cdn-uz.kursiv.media/wp-content/uploads/2025/11/photo_2025-11-18_17-20-37.jpg"
          alt="Chevrolet Gentra"
        />

        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>My Logistic</h1>
            <p>Sinotrack ST-901M</p>
          </div>
        </div>

        <dl class="metrics">
          <div>
            <dt>Статус</dt>
            <dd><span id="statusDot" class="dot offline"></span><span id="status">Offline</span></dd>
          </div>
          <div>
            <dt>Устройство</dt>
            <dd id="deviceId">-</dd>
          </div>
          <div>
            <dt>Координаты</dt>
            <dd id="coordinates">-</dd>
          </div>
          <div>
            <dt>Скорость</dt>
            <dd id="speed">-</dd>
          </div>
          <div>
            <dt>Последнее обновление</dt>
            <dd id="time">-</dd>
          </div>
        </dl>

        <section class="route-panel" aria-label="Route history">
          <div class="field">
            <label for="trackDate">Дата маршрута</label>
            <input id="trackDate" type="date" />
          </div>

          <div class="field">
            <label for="speedLimit">Лимит скорости, км/ч</label>
            <input id="speedLimit" type="number" min="1" max="180" step="1" value="60" />
          </div>

          <div class="actions">
            <button id="loadTrack" type="button">Показать</button>
            <button id="playTrack" type="button">▶</button>
          </div>

          <dl class="route-stats">
            <div>
              <dt>Точек</dt>
              <dd id="trackCount">-</dd>
            </div>
            <div>
              <dt>Выше лимита</dt>
              <dd id="overspeedCount">-</dd>
            </div>
            <div>
              <dt>Макс. скорость</dt>
              <dd id="maxSpeed">-</dd>
            </div>
          </dl>

          <section id="segmentPanel" class="segment-panel" hidden>
            <div>
              <h2>Отрезок</h2>
              <p id="segmentSummary">-</p>
            </div>
            <div id="segmentOptions" class="segment-options"></div>
          </section>
        </section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
